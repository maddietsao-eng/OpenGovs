name: Process Budget PDFs

on:
  push:
    paths:
      - "budget-sources.json"
    branches:
      - main

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Process budget PDFs
        run: npm run process-pdfs

      - name: Commit updated data files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update processed budget data [skip ci]"
          file_pattern: "data/chunks.json data/year-summaries.json data/sources-index.json"
          commit_user_name: "OpenGovs Bot"
          commit_user_email: "bot@opengovs.com"
